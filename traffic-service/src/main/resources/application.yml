spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/traffic_db}
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/traffic-ai
server:
  port: 8081
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: traffic-service-swagger-ui
      use-pkce-with-authorization-code-grant: true